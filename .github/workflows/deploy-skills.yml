name: Deploy Skills

# DEPRECATED (see #68): the push-based fan-out deploy is being retired in favour of
# the pull-based `/skill` client — repos install/update skills on demand from the
# registry, customised by the invoking agent. The automatic `push:` trigger has been
# removed so editing generic/**, customizations/**, or deploy.conf no longer fans out
# a 16-repo re-customization. `workflow_dispatch` is retained only as a manual escape
# hatch during migration and will be removed by #75.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - changed-templates
          - changed-customs

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        run: |
          # Manual-only workflow: the push: auto-deploy trigger was retired (see the
          # header and #69), so this never fires on a push and there is no diff to
          # inspect. Everything is driven by the manual `mode` input.
          MODE="${{ github.event.inputs.mode }}"
          case "$MODE" in
            all)               TEMPLATES_CHANGED=0; CUSTOMS_CHANGED=0; CONF_CHANGED=1 ;;
            changed-templates) TEMPLATES_CHANGED=1; CUSTOMS_CHANGED=0; CONF_CHANGED=0 ;;
            changed-customs)   TEMPLATES_CHANGED=0; CUSTOMS_CHANGED=1; CONF_CHANGED=0 ;;
            *)                 echo "Unknown mode: $MODE" >&2; exit 1 ;;
          esac
          echo "Manual dispatch — mode: $MODE"

          echo "templates=$TEMPLATES_CHANGED" >> "$GITHUB_OUTPUT"
          echo "customs=$CUSTOMS_CHANGED" >> "$GITHUB_OUTPUT"
          echo "conf=$CONF_CHANGED" >> "$GITHUB_OUTPUT"

          echo "Changed templates: $TEMPLATES_CHANGED"
          echo "Changed customs: $CUSTOMS_CHANGED"
          echo "Changed conf: $CONF_CHANGED"

      - name: Deploy changed templates
        if: steps.changes.outputs.templates != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: bash deploy.sh --changed-templates

      - name: Deploy changed customizations
        if: steps.changes.outputs.customs != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: bash deploy.sh --changed-customs

      - name: Deploy all (config changed)
        if: steps.changes.outputs.conf != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}
        run: bash deploy.sh
