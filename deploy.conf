# deploy.conf — Repo-to-skill mapping for sync.sh and deploy.sh
#
# Format: REPO|GITHUB_OWNER/REPO|LOCAL_PATH_SUFFIX|SKILL1,SKILL2,...
#
# LOCAL_PATH_SUFFIX is relative to $HOME (e.g., Projects/chroxy → ~/Projects/chroxy)
# Only lists skills that have a generic/ template. Repo-only skills (commit, qa-update,
# tdd-feature, consolidate-dependabot) are managed directly in each repo.
#
# Lines starting with # are comments. Blank lines are ignored.

